<svg width="320" height="80" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="keffiyeh" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <path d="M0 3 L3 0 M3 6 L6 3" stroke="#000000" stroke-width="0.8" fill="none" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- S - Black -->
  <text x="10" y="58" fill="#000000" font-family="Outfit, Inter, Arial, sans-serif" font-size="56" font-weight="900" letter-spacing="3">S</text>

  <!-- A - Green with Keffiyeh and Arrow -->
  <g>
    <text x="50" y="58" fill="#009639" font-family="Outfit, Inter, Arial, sans-serif" font-size="56" font-weight="900" letter-spacing="3">A</text>
    <circle cx="74" cy="42" r="8" fill="url(#keffiyeh)" opacity="0.6"/>
    <path d="M74 18 L74 2 M74 2 L66 14 M74 2 L82 14" stroke="#EE2A35" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- H - White with black outline -->
  <text x="94" y="58" fill="#FFFFFF" stroke="#000000" stroke-width="1.5" font-family="Outfit, Inter, Arial, sans-serif" font-size="56" font-weight="900" letter-spacing="3">H</text>

  <!-- M - Black -->
  <text x="140" y="58" fill="#000000" font-family="Outfit, Inter, Arial, sans-serif" font-size="56" font-weight="900" letter-spacing="3">M</text>

  <!-- I - Red with triangle -->
  <g>
    <text x="192" y="58" fill="#EE2A35" font-family="Outfit, Inter, Arial, sans-serif" font-size="56" font-weight="900" letter-spacing="3">I</text>
    <path d="M206 58 L224 42 L224 58 Z" fill="#EE2A35"/>
  </g>

  <!-- Palestine Connect -->
  <text x="240" y="45" fill="#009639" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.1em">PALESTINE</text>
  <text x="240" y="62" fill="#EE2A35" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.1em">CONNECT</text>
</svg>