<svg width="520" height="160" viewBox="0 0 520 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sahmi Palestine Connect logo concept</title>
  <desc id="desc">A teal to blue S-shaped investment mark used as the first letter in Sahmi, with amber funding nodes and a clean wordmark.</desc>
  <defs>
    <linearGradient id="markGradient" x1="28" y1="24" x2="132" y2="136" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="48" y1="112" x2="126" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <filter id="lineGlow" x="26" y="20" width="124" height="126" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <path d="M48 112C62 102.6 71.6 92.5 84.4 80C97.2 67.2 108.6 55.8 126 45.5" stroke="url(#markGradient)" stroke-opacity="0.2" stroke-width="5" stroke-linecap="round" stroke-dasharray="7 9"/>
  <path d="M52 108C67.3 121.4 94.8 116.8 100.7 97.5C105.7 80.8 89 73.8 76.4 68.5C63.8 63.2 57.1 55.3 64.1 44.8C73.5 30.8 98.4 33.7 116.8 51.8" stroke="url(#markGradient)" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" filter="url(#lineGlow)"/>
  <path d="M111.8 36L124.4 57.6L99.8 59.7" stroke="url(#markGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="48" cy="112" r="7" fill="url(#nodeGradient)"/>
  <circle cx="48" cy="112" r="15.5" fill="#F59E0B" fill-opacity="0.12"/>
  <circle cx="84" cy="80" r="6.5" fill="#0F766E" fill-opacity="0.8"/>
  <circle cx="126" cy="46" r="7" fill="url(#nodeGradient)"/>
  <circle cx="126" cy="46" r="15.5" fill="#F59E0B" fill-opacity="0.12"/>

  <text x="124" y="94" fill="#1D4ED8" font-family="Outfit, Inter, Arial, sans-serif" font-size="64" font-weight="800">ahmi</text>
  <text x="126" y="124" fill="#0F766E" fill-opacity="0.68" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">PALESTINE CONNECT</text>
</svg>
